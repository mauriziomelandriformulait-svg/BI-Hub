<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Reporting HUB</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .header-title { text-align: center; margin-bottom: 40px; font-size: 2.5rem; font-weight: bold; color: #1e293b; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .map-card { background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 6px solid #FFCC00; cursor: pointer; transition: transform 0.2s; }
        .map-card:hover { transform: translateY(-5px); border-color: #eab308; }
        
        .label { font-size: 14px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
        .kpi-value { font-size: 1.5rem; font-weight: bold; color: #1e293b; }
        
        .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; padding-top: 10px; }
        .bar { width: 12px; background: #FFCC00; border-radius: 2px 2px 0 0; }
        
        .gauge-container { position: relative; width: 100px; height: 50px; overflow: hidden; }
        .gauge { width: 100px; height: 100px; border-radius: 50%; border: 10px solid #e2e8f0; border-bottom-color: #FFCC00; transform: rotate(135deg); }
        .needle { position: absolute; bottom: 0; left: 50%; width: 2px; height: 40px; background: #1e293b; transform-origin: bottom; transform: rotate(45deg); }
    </style>
</head>
<body>

<main class="main-content">
    <h1 class="header-title">BI Reporting HUB</h1>
    
    <div class="grid">
        
        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20AFC')">
            <span class="label">AFC</span>
            <div class="kpi-value">1,18 mln</div>
            <div style="font-size: 11px; color: #64748b; margin-top:5px;">PFN</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20Sales')">
            <span class="label">Sales</span>
            <div class="gauge-container">
                <div class="gauge"></div>
                <div class="needle"></div>
            </div>
            <div style="font-size: 11px; font-weight: bold; margin-top:10px;">4,5 mln / 7,0 mln</div>
            <div style="font-size: 10px; color: #64748b;">Fatturato vs Budget</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20Procurement')">
            <span class="label">Procurement</span>
            <div class="bar-chart">
                <div class="bar" style="height:30px"></div>
                <div class="bar" style="height:45px"></div>
                <div class="bar" style="height:35px"></div>
                <div class="bar" style="height:50px"></div>
                <div class="bar" style="height:40px"></div>
                <div class="bar" style="height:55px"></div>
                <div class="bar" style="height:60px"></div>
            </div>
            <div style="font-size: 10px; color: #64748b; margin-top:8px;">Acquisti (Gen-Lug)</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20Production')">
            <span class="label">Production</span>
            <div class="kpi-value">84.5%</div>
            <div style="font-size: 11px; color: #64748b; margin-top:5px;">OEE (Efficienza)</div>
        </div>

    </div>
</main>

<script>
    function inviaMessaggioNavigazione(percorsoTarget) {
        let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
        const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
        window.parent.postMessage(payload, '*');
    }
</script>

</body>
</html>
