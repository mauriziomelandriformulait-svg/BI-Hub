<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Reporting HUB</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .header-title { text-align: center; margin-bottom: 40px; font-size: 2.5rem; font-weight: bold; color: #1e293b; }
        
        /* Modificato per 5 colonne */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        
        .map-card { background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 6px solid #FFCC00; cursor: pointer; transition: transform 0.2s; }
        .map-card:hover { transform: translateY(-5px); border-color: #eab308; }
        
        .label { font-size: 13px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .kpi-value { font-size: 1.3rem; font-weight: bold; color: #1e293b; }
        
        .afc-bars { display: flex; align-items: flex-end; gap: 5px; height: 40px; }
        .bar-dso { width: 18px; background: #FFCC00; } 
        .bar-dpo { width: 18px; background: #000000; } 
        
        .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 40px; padding-top: 10px; }
        .bar { width: 8px; background: #FFCC00; border-radius: 2px 2px 0 0; }
        
        .gauge-container { position: relative; width: 70px; height: 35px; overflow: hidden; }
        .gauge { width: 70px; height: 70px; border-radius: 50%; border: 7px solid #e2e8f0; border-bottom-color: #FFCC00; transform: rotate(135deg); }
        .needle { position: absolute; bottom: 0; left: 50%; width: 2px; height: 30px; background: #1e293b; transform-origin: bottom; transform: rotate(45deg); }
    </style>
</head>
<body>

<main class="main-content">
    <h1 class="header-title">BI Reporting HUB</h1>
    
    <div class="grid">
        
        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MA%20-%20Analysis')">
            <span class="label">Performance</span>
            <div class="kpi-value">14,02 mln</div>
            <div style="font-size: 10px; color: #64748b; margin-top:5px;">PFN</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20AFC')">
            <span class="label">AFC</span>
            <div class="afc-bars">
                <div class="bar-dso" style="height: 35px" title="DSO 72gg"></div>
                <div class="bar-dpo" style="height: 20px" title="DPO 41gg"></div>
            </div>
            <div style="font-size: 9px; margin-top:8px;">DSO (72) | DPO (41)</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20Sales')">
            <span class="label">Sales</span>
            <div class="gauge-container">
                <div class="gauge"></div>
                <div class="needle"></div>
            </div>
            <div style="font-size: 10px; font-weight: bold; margin-top:8px;">4,5 / 7,0 mln</div>
            <div style="font-size: 9px; color: #64748b;">Fatturato</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20Procurement')">
            <span class="label">Procurement</span>
            <div class="bar-chart">
                <div class="bar" style="height:15px"></div>
                <div class="bar" style="height:25px"></div>
                <div class="bar" style="height:20px"></div>
                <div class="bar" style="height:30px"></div>
                <div class="bar" style="height:22px"></div>
                <div class="bar" style="height:35px"></div>
                <div class="bar" style="height:40px"></div>
            </div>
            <div style="font-size: 9px; color: #64748b; margin-top:8px;">Acquisti</div>
        </div>

        <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/MP%20-%20Overview%20Production')">
            <span class="label">Production</span>
            <div class="kpi-value">84.5%</div>
            <div style="font-size: 10px; color: #64748b; margin-top:5px;">OEE</div>
        </div>

    </div>
</main>

<script>
    function inviaMessaggioNavigazione(percorsoTarget) {
        let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
        const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
        window.parent.postMessage(payload, '*');
    }
</script>

</body>
</html>
